<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bel Otomatis</title>
<meta name="theme-color" content="#4faaff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bel Otomatis">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Modal Edit -->
<div class="modal-overlay" id="modalOverlay" onclick="tutupModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">✏️ Edit Jadwal</div>
    <div class="form-grid">

      <div class="fg">
        <label>Nama Jadwal</label>
        <input type="text" id="editNama" placeholder="cth: Masuk Kelas" />
      </div>

      <div class="fg">
        <label>Waktu</label>
        <input type="time" id="editWaktu" />
      </div>

      <div class="fg full">
        <label>Pilih Suara Bel</label>
        <div class="row-flex">
          <select id="editSuara">
            <option value="ding">🔔 Ding — Klasik & lembut</option>
            <option value="sekolah">🏫 Bel Sekolah — Seperti bel kelas</option>
            <option value="digital">📱 Digital Beep — Nada modern</option>
            <option value="lonceng">⛪ Lonceng — Melodi lonceng</option>
            <option value="alarm">⏰ Alarm — Bunyi keras</option>
            <option value="triple">✨ Triple Ding — 3x dentingan</option>
          </select>
        </div>
      </div>

      <div class="fg full">
        <label>Hari Aktif</label>
        <div class="day-picker" id="editDayPicker">
          <button type="button" class="day-btn" data-day="1">Sen</button>
          <button type="button" class="day-btn" data-day="2">Sel</button>
          <button type="button" class="day-btn" data-day="3">Rab</button>
          <button type="button" class="day-btn" data-day="4">Kam</button>
          <button type="button" class="day-btn" data-day="5">Jum</button>
          <button type="button" class="day-btn" data-day="6">Sab</button>
          <button type="button" class="day-btn" data-day="0">Min</button>
        </div>
        <div class="day-shortcuts">
          <button type="button" class="btn-shortcut" onclick="pilihHariEdit('semua')">Semua</button>
          <button type="button" class="btn-shortcut" onclick="pilihHariEdit('senin-jumat')">Sen–Jum</button>
          <button type="button" class="btn-shortcut" onclick="pilihHariEdit('weekend')">Weekend</button>
          <button type="button" class="btn-shortcut" onclick="pilihHariEdit('none')">Reset</button>
        </div>
      </div>

      <div class="fg full" style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="simpanEdit()" style="flex:1">💾 Simpan</button>
        <button class="btn btn-cancel" onclick="tutupModal()" style="flex:1">Batal</button>
      </div>

    </div>
  </div>
</div>

<!-- Notifikasi -->
<div class="notif-overlay" id="notif">
  <div class="nt" id="notifTitle">🔔 Bel Berbunyi!</div>
  <div class="ns" id="notifSub">Waktu: 00:00</div>
</div>

<!-- Header -->
<div class="header">
  <span class="bell-icon" id="bellIcon">🔔</span>
  <h1>Bel Otomatis</h1>
  <p>Atur jadwal bel sekolah / kantor dengan mudah</p>
</div>

<!-- Jam -->
<div class="clock-bar">
  <div>
    <div class="time-display" id="clockDisplay">--:--:--</div>
    <div class="date-display" id="dateDisplay">Memuat tanggal...</div>
  </div>
  <div class="status-area">
    <div><span class="status-dot"></span><span class="status-text">Sistem Aktif</span></div>
    <div class="next-bell" id="nextBellInfo">–</div>
  </div>
</div>

<!-- Form Input -->
<div class="card">
  <div class="card-title">➕ Tambah Jadwal Bel</div>
  <div class="form-grid">

    <div class="fg">
      <label>Nama Jadwal</label>
      <input type="text" id="inNama" placeholder="cth: Masuk Kelas" />
    </div>

    <div class="fg">
      <label>Waktu</label>
      <input type="time" id="inWaktu" />
    </div>

    <div class="fg full">
      <label>Pilih Suara Bel</label>
      <div class="row-flex">
        <select id="inSuara" onchange="handleSuaraChange(this)">
          <option value="ding">🔔 Ding — Klasik & lembut</option>
          <option value="sekolah">🏫 Bel Sekolah — Seperti bel kelas</option>
          <option value="digital">📱 Digital Beep — Nada modern</option>
          <option value="lonceng">⛪ Lonceng — Melodi lonceng</option>
          <option value="alarm">⏰ Alarm — Bunyi keras</option>
          <option value="triple">✨ Triple Ding — 3x dentingan</option>
          <option disabled style="color:#ccc">──────────────</option>
          <option value="__tambah__">➕ Tambah Musik dari File...</option>
        </select>
        <input type="file" id="fileMusik" accept="audio/*" style="display:none" onchange="handleUpload(this)" />
        <button class="btn btn-test" onclick="testSound()">▶ Tes</button>
      </div>
    </div>

    <div class="fg full">
      <label>Hari Aktif</label>
      <div class="day-picker">
        <button type="button" class="day-btn" data-day="1">Sen</button>
        <button type="button" class="day-btn" data-day="2">Sel</button>
        <button type="button" class="day-btn" data-day="3">Rab</button>
        <button type="button" class="day-btn" data-day="4">Kam</button>
        <button type="button" class="day-btn" data-day="5">Jum</button>
        <button type="button" class="day-btn" data-day="6">Sab</button>
        <button type="button" class="day-btn" data-day="0">Min</button>
      </div>
      <div class="day-shortcuts">
        <button type="button" class="btn-shortcut" onclick="pilihHari('semua')">Semua</button>
        <button type="button" class="btn-shortcut" onclick="pilihHari('senin-jumat')">Sen–Jum</button>
        <button type="button" class="btn-shortcut" onclick="pilihHari('weekend')">Weekend</button>
        <button type="button" class="btn-shortcut" onclick="pilihHari('none')">Reset</button>
      </div>
    </div>

    <div class="fg full">
      <button class="btn btn-primary" onclick="tambahJadwal()">+ Tambah ke Daftar</button>
    </div>

  </div>
</div>

<!-- Tabel -->
<div class="card">
  <div class="card-title">📋 Daftar Jadwal Bel</div>
  <div class="table-wrap">
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="ei">📭</div>
      <div>Belum ada jadwal bel.<br>Tambahkan jadwal di atas.</div>
    </div>
    <table id="jadwalTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Nama</th>
          <th>Waktu</th>
          <th>Suara</th>
          <th>Hari</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
